# 应用默认配置文件，主要用于本地 H2 与通用运行参数。
spring:
  application:
    name: fundcat-api
  datasource:
    url: jdbc:h2:mem:fundcat;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: ${FUNDCAT_PERSISTENCE_BATCH_SIZE:100}
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
  h2:
    console:
      enabled: true
      path: /h2-console
  jackson:
    time-zone: ${APP_TIMEZONE:${user.timezone:UTC}}
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false
  task:
    scheduling:
      pool:
        size: 4

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

fundcat:
  auth:
    access-token-ttl-minutes: 240
    refresh-token-ttl-days: 14
    session-store: ${AUTH_SESSION_STORE:memory}
  market-data:
    timezone: ${APP_TIMEZONE:${user.timezone:UTC}}
    estimate-poll-interval-minutes: 5
    nav-poll-interval-minutes: 20
    trade-backfill-max-days: 30
    estimate-trading-start: "09:30"
    estimate-trading-end: "15:00"
    nav-poll-start: "20:00"
    nav-poll-end: "23:59"
    nav-backup-poll-start: "08:00"
    nav-backup-poll-end: "10:00"
    akshare-bridge:
      enabled: ${AKSHARE_BRIDGE_ENABLED:true}
      base-url: ${AKSHARE_BRIDGE_BASE_URL:http://127.0.0.1:8000}
      connect-timeout: 5s
      read-timeout: 15s
  persistence:
    batch-size: ${FUNDCAT_PERSISTENCE_BATCH_SIZE:100}

logging:
  file:
    name: logs/fundcat-api.log
