# 应用默认配置文件，使用 MySQL 作为主数据源并承载通用运行参数。
spring:
  application:
    name: fundcat-api
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:fundcat}?useUnicode=true&characterEncoding=utf8&connectionTimeZone=LOCAL&forceConnectionTimeZoneToSession=true
    username: ${DB_USERNAME:fundcat}
    password: ${DB_PASSWORD:change-me-app-password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: ${FUNDCAT_PERSISTENCE_BATCH_SIZE:100}
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/migration-mysql
  h2:
    console:
      enabled: false
      path: /h2-console
  jackson:
    time-zone: ${APP_TIMEZONE:${user.timezone:UTC}}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:change-me-redis-password}
      repositories:
        enabled: false
  task:
    scheduling:
      pool:
        size: 4

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

fundcat:
  auth:
    access-token-ttl-minutes: 240
    refresh-token-ttl-days: 14
    session-store: ${AUTH_SESSION_STORE:redis}
  market-data:
    timezone: ${APP_TIMEZONE:${user.timezone:UTC}}
    estimate-poll-interval-minutes: 5
    nav-poll-interval-minutes: 20
    trade-backfill-max-days: 30
    estimate-trading-start: "09:30"
    estimate-trading-end: "15:00"
    nav-poll-start: "20:00"
    nav-poll-end: "23:59"
    nav-backup-poll-start: "08:00"
    nav-backup-poll-end: "10:00"
    akshare-bridge:
      enabled: ${AKSHARE_BRIDGE_ENABLED:true}
      base-url: ${AKSHARE_BRIDGE_BASE_URL:http://127.0.0.1:8000}
      connect-timeout: 5s
      read-timeout: 15s
    rocketmq:
      enabled: ${FUNDCAT_ROCKETMQ_ENABLED:false}
      consumer-mode: ${FUNDCAT_ROCKETMQ_CONSUMER_MODE:legacy}
      endpoints: ${FUNDCAT_ROCKETMQ_ENDPOINTS:}
      topic: ${FUNDCAT_ROCKETMQ_TOPIC:fund_nav_ready_batch}
      tag: ${FUNDCAT_ROCKETMQ_TAG:fund-nav-ready}
      consumer-group: ${FUNDCAT_ROCKETMQ_CONSUMER_GROUP:fundcat-fund-nav-consumer}
      namespace: ${FUNDCAT_ROCKETMQ_NAMESPACE:}
      access-key: ${FUNDCAT_ROCKETMQ_ACCESS_KEY:}
      secret-key: ${FUNDCAT_ROCKETMQ_SECRET_KEY:}
      ssl-enabled: ${FUNDCAT_ROCKETMQ_SSL_ENABLED:false}
  persistence:
    batch-size: ${FUNDCAT_PERSISTENCE_BATCH_SIZE:100}

logging:
  file:
    name: logs/fundcat-api.log
