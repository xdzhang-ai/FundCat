spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:fundcat}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: ${DB_USERNAME:fundcat}
    password: ${DB_PASSWORD:change-me-app-password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:change-me-redis-password}
  h2:
    console:
      enabled: false

fundcat:
  auth:
    session-store: ${AUTH_SESSION_STORE:redis}
